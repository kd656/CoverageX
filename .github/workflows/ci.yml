name: Build CoverageX

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: "-Dmaven.artifact.threads=8"
  FIXTURE_JDKS: "21 22 25"

jobs:
  build:
    name: Build project (JDK 21)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build parent project
        working-directory: coveragex
        run: mvn -B install

      - name: Upload local CoverageX artifacts
        uses: actions/upload-artifact@v5
        with:
          name: m2-coveragex
          path: ~/.m2/repository/io/github/kd656
          retention-days: 1

      - name: Upload Maven plugin jar
        uses: actions/upload-artifact@v5
        with:
          name: coveragex-maven-plugin
          path: coveragex/coveragex-maven-plugin/target/*.jar
          if-no-files-found: error

  compatibility-matrix:
    name: Compatibility (${{ matrix.profile }})
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: fixtures-jdk22
            fixture-jdk: '22'
            modules: coveragex-test-fixtures,coveragex-test-fixtures-jdk22,coveragex-compatibility-tests
          - profile: fixtures-jdk25
            fixture-jdk: '25'
            modules: coveragex-test-fixtures,coveragex-test-fixtures-jdk22,coveragex-test-fixtures-jdk25,coveragex-compatibility-tests

    steps:
      - uses: actions/checkout@v5

      - id: setup-jdk21
        name: Setup tool JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - id: setup-fixture-jdk
        name: Setup fixture JDK ${{ matrix.fixture-jdk }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.fixture-jdk }}
          java-package: jdk

      - name: Export toolchain JDK paths
        env:
          JDK21_PATH: ${{ steps.setup-jdk21.outputs.path }}
          FIXTURE_JDK: ${{ matrix.fixture-jdk }}
          FIXTURE_PATH: ${{ steps.setup-fixture-jdk.outputs.path }}
        run: |
          set -euo pipefail

          if [ -z "${FIXTURE_PATH}" ]; then
            echo "::error::setup-java did not provide a JDK ${FIXTURE_JDK} install path." >&2
            exit 1
          fi

          echo "JAVA_21_HOME=${JDK21_PATH}" >> "$GITHUB_ENV"
          echo "JAVA_${FIXTURE_JDK}_HOME=${FIXTURE_PATH}" >> "$GITHUB_ENV"

          # Maven validates every JDK entry in .ci/toolchains.xml, so inactive
          # fixture JDKs get a real placeholder path. The active profile still
          # selects the real fixture JDK.
          for jdk in ${FIXTURE_JDKS}; do
            if [ "${jdk}" = "21" ] || [ "${jdk}" = "${FIXTURE_JDK}" ]; then
              continue
            fi

            echo "JAVA_${jdk}_HOME=${JDK21_PATH}" >> "$GITHUB_ENV"
          done

      - name: Reset Maven runtime to JDK 21
        run: |
          echo "JAVA_HOME=${JAVA_21_HOME}" >> "$GITHUB_ENV"
          echo "${JAVA_21_HOME}/bin" >> "$GITHUB_PATH"

      - name: Restore local CoverageX artifacts
        uses: actions/download-artifact@v5
        with:
          name: m2-coveragex
          path: ~/.m2/repository/io/github/kd656

      - name: Run compatibility tests
        working-directory: coveragex
        run: |
          mvn -B -t .ci/toolchains.xml \
            -P${{ matrix.profile }} \
            -pl ${{ matrix.modules }} test

      - name: Upload plan dumps on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: plan-dumps-${{ matrix.profile }}
          path: coveragex/coveragex-compatibility-tests/target/plan-dumps/
          if-no-files-found: ignore

  all-green:
    name: All green
    needs: [build, compatibility-matrix]
    runs-on: ubuntu-latest

    steps:
      - run: echo "Build and compatibility matrix passed."

  publish-version:
    name: Publish version
    needs: all-green
    # if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      PUBLISH_MODULES: .,coveragex-api,coveragex-test-api,coveragex-core,coveragex-agent,coveragex-maven-plugin,coveragex-test-junit5

    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central-portal-snapshots
          server-username: CENTRAL_PORTAL_USERNAME
          server-password: CENTRAL_PORTAL_PASSWORD

      - name: Read project version
        id: project-version
        working-directory: coveragex
        run: |
          version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Project version: ${version}"

      - name: Check publishable snapshot version
        id: publish-check
        env:
          PROJECT_VERSION: ${{ steps.project-version.outputs.version }}
        run: |
          if [[ "${PROJECT_VERSION}" != *-SNAPSHOT ]]; then
            echo "::notice::Skipping publish because ${PROJECT_VERSION} is not a snapshot version."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Deploy snapshot
        if: steps.publish-check.outputs.publish == 'true'
        working-directory: coveragex
        env:
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: |
          mvn -B \
            -DskipTests \
            -pl "${PUBLISH_MODULES}" \
            -am deploy
